<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crowd Panic Detection System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #e74c3c);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem;
            color: #fff;
        }

        .brand h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .brand p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .card {
            background: #12121f;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            color: #aaa;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s;
        }

        .btn-login:hover { opacity: 0.9; }

        .error {
            background: rgba(231,76,60,0.15);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
        }

        .hint {
            margin-top: 1.2rem;
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 0.82rem;
            color: #888;
        }

        .hint span { color: #667eea; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
            <h1>Crowd Panic Detection</h1>
            <p>Security Monitoring System</p>
        </div>

        <div class="card">
            {% if error %}
            <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="hint">
                Default — Username: <span>admin</span> &nbsp;|&nbsp; Password: <span>admin123</span>
            </div>
        </div>
    </div>
</body>
</html>
